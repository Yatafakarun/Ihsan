<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ihsan</title>
    <meta
      name="description"
      content="Short Islamic reminders for WhatsApp status in Arabic and English. حالات واتساب دينية بالعربية والإنجليزية."
    />
    <meta
      name="keywords"
      content="Islamic reminders, WhatsApp status, Arabic quotes, English reminders, dhikr, Muslim quotes, daily reminders, Quran reminders, Hadith reminders, حالات واتساب, حالات وتس, حالات دينية وتس, حالات اسلامية, حالات دينية"
    />
    <meta name="theme-color" content="#0f6d5f" />
    <link rel="stylesheet" href="assets/styles/theme.css" />
    <link rel="stylesheet" href="assets/styles/app.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand" id="appName">Ihsan</div>
        <div class="lang-toggle" role="group" aria-label="Language">
          <button type="button" class="lang-btn" data-lang="en">English</button>
          <button type="button" class="lang-btn" data-lang="ar">العربية</button>
        </div>
      </header>

      <section class="status" id="setupPanel" hidden>
        <h2 id="setupTitle">Setup needed</h2>
        <p id="setupBody">
          Set the published CSV URLs in <code>assets/js/app.js</code> for English and Arabic.
        </p>
      </section>

      <section class="status error" id="errorPanel" hidden>
        <h2 id="errorTitle">Could not load reminders</h2>
        <p id="errorBody">Please check the CSV links and try again.</p>
        <button type="button" class="btn" id="retryBtn">Retry</button>
      </section>

      <section class="filter-row">
        <label for="categorySelect" id="categoryLabel">Category</label>
        <select id="categorySelect"></select>
      </section>

      <section class="card" aria-live="polite">
        <div class="card-content">
          <p id="reminderText">Loading...</p>
          <div class="card-details" id="cardDetails" hidden>
            <div class="card-meta" id="sourceBlock">
              <ul class="ref-list" id="sourceList"></ul>
            </div>
            <div class="card-meta" id="descBlock">
              <p class="card-desc" id="descText"></p>
            </div>
          </div>
        </div>
      </section>

      <section class="actions">
        <button type="button" class="btn primary" id="newBtn">New</button>
        <button type="button" class="btn" id="copyBtn">Copy</button>
      </section>

      <section class="meta">
        <span id="charCount">0</span>
        <span id="lengthHint">OK</span>
      </section>

      <footer id="footerText">
        Pick a reminder, tap Copy or Share, then paste into WhatsApp status.
      </footer>

      <section class="diagnostics" id="diagnostics" hidden>
        <div class="diag-header">
          <h2>Diagnostics</h2>
          <button type="button" class="btn" id="selfTestBtn">Run self-test</button>
        </div>
        <ul class="diag-list" id="diagList"></ul>
        <ul class="diag-results" id="diagResults"></ul>
      </section>
    </div>

    <div class="toast" id="toast" hidden></div>

    <script type="module" src="assets/js/app.js"></script>
  </body>
</html>
